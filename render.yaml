# Deploy do backend em https://render.com
# Após deploy, copie a URL (ex: https://fluisom-api.onrender.com) e configure na Vercel
services:
  - type: web
    name: fluisom-api
    runtime: node
    rootDir: backend/server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://fluisom.vercel.app
      - key: BACKEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUNO_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
